name: Publish Docs

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy (e.g. v2026.2.1-beta.1)"
        required: true

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy versioned docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # mike needs full gh-pages history

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Deploy versioned docs
        run: |
          TAG="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          VERSION="${TAG#v}"

          if [[ "$VERSION" == *"-beta."* || "$VERSION" == *"-alpha."* || "$VERSION" == *"-rc."* ]]; then
            # Pre-release: deploy under the full version string and update 'beta' alias
            uv run mike deploy --push --update-aliases "$VERSION" beta
            # Make 'beta' the default only when no stable 'latest' exists yet
            if ! uv run mike list 2>/dev/null | grep -q '\blatest\b'; then
              uv run mike set-default --push beta
            fi
          else
            # Stable release: deploy under the full version string and update 'latest' alias
            uv run mike deploy --push --update-aliases "$VERSION" latest
            uv run mike set-default --push latest
          fi
